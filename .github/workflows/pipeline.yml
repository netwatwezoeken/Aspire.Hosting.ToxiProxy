name: .NET

on:
  push:
    branches: [ "main" ]
    tags:
      - '*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      #- name: Test
      #  run: dotnet test --no-build --verbosity normal
      - name: Nuget
        working-directory: ./src/Aspire.Hosting.ToxiProxy
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          dotnet pack /p:Version=${{ github.ref_name }}
          dotnet nuget push ./nupkg/Nwwz.Aspire.Hosting.ToxiProxy.${{ github.ref_name }}.nupkg -k ${{ secrets.NUGET_APIKEY }} -s https://api.nuget.org/v3/index.json
      